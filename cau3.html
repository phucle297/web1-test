              </svg>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                data-slot="icon"
                aria-hidden="true"
                class="size-6 not-in-aria-expanded:hidden"

                <path

          <div

          >
            <div class="flex shrink-0 items-center">
              <img
                src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
                alt="Your Company"

      <el-disclosure id="mobile-menu" hidden class="block sm:hidden">
        <div class="space-y-1 px-2 pt-2 pb-3">
          <!-- Current: "bg-gray-900 text-white", Default: "text-gray-300 hover:bg-white/5 hover:text-white" -->
          <a

    <div
      class="fixed inset-0 z-50 grid place-content-center bg-black/50 p-4"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >
      <div class="w-full max-w-md rounded-lg bg-white p-6 shadow-lg">
        <div class="flex items-start justify-between">
          <h2
            id="modalTitle"
            class="text-xl font-bold text-gray-900 sm:text-2xl"
          >
            Create New Cource
          </h2>

          <button
            onclick="window.history.back()"
            type="button"
            class="-me-4 -mt-4 rounded-full p-2 text-gray-400 transition-colors hover:bg-gray-50 hover:text-gray-600 focus:outline-none"
            aria-label="Close"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="size-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>

        <form method="post" action="cau1.html" class="mt-6">
          <!-- Title, Description, Image URL, Level(select), Price(VND) (50% -->
          <!-- width), total lectures(50% width), All prefix with `Cource `, All have -->
          <!-- asterisk symbol, validate not null, description max length 50 -->
          <!-- characters, image must be a valid url. checkbox Mark as bestseller -->
          <!-- default uncheck, price >=0, step 10000, Close gray and Create -->
          <!-- Course blue -->
          <div class="space-y-4">
            <div>
              <label for="title" class="block text-sm font-medium text-gray-700"
                >Cource Title *</label
              >
              <input
                type="text"
                name="title"
                id="title"
                required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
              />
            </div>
            <div>
              <label
                for="description"
                class="block text-sm font-medium text-gray-700"
                >Cource Description *</label
              >
              <textarea
                name="description"
                id="description"
                maxlength="50"
                required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
              ></textarea>
            </div>
            <div>
              <label
                for="image_url"
                class="block text-sm font-medium text-gray-700"
                >Cource Image URL *</label
              >
              <input
                type="url"
                name="image_url"
                id="image_url"
                required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
              />
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label
                  for="level"
                  class="block text-sm font-medium text-gray-700"
                  >Cource Level *</label
                >
                <select
                  name="level"
                  id="level"
                  required
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                >
                  <option value="">Select level</option>
                  <option value="beginner">Beginner</option>
                  <option value="intermediate">Intermediate</option>
                  <option value="advanced">Advanced</option>
                </select>
              </div>
              <div>
                <label
                  for="price"
                  class="block text-sm font-medium text-gray-700"
                  >Cource Price (VND) *</label
                >
                <input
                  type="number"
                  name="price"
                  id="price"
                  min="0"
                  step="10000"
                  required
                  class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                />
              </div>
            </div>
            <div>
              <label
                for="total_lectures"
                class="block text-sm font-medium text-gray-700"
                >Total Lectures *</label
              >
              <input
                type="number"
                name="total_lectures"
                id="total_lectures"
                min="0"
                required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
              />
            </div>
            <div class="flex items center">
              <input
                type="checkbox"
                name="bestseller"
                id="bestseller"
                class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                checked="true"
              />
              <label for="bestseller" class="ml-2 block text-sm text-gray-900"
                >Mark as Bestseller</label
              >
            </div>
            <div class="mt-6 flex justify-end gap-4">
              <button
                type="button"
                onclick="window.history.back()"
                class="rounded-md bg-gray-200 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2"
              >
                Close
              </button>
              <button
                type="submit"
                class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
              >
                Create Course
              </button>
            </div>
          </div>
        </form>
      </div>
