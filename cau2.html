    <footer class="text-center text-gray-500 mt-8">

    <script type="module">
      const data = await fetch("./data.json").then((response) =>
        response.json(),
      );

      let page = 1;
      const size = 5;
      const totalPages = Math.ceil(data.length / size);

      const dataDiv = document.getElementById("data");
      //     {
      //   "id": 12,
      //   "image_url": "https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=400&h=300&fit=crop",
      //   "title": "Adaptive Faculty Toolkit",
      //   "description": "Faculty learn to craft adaptive study kits, discussion guides, and grading rubrics with NotebookLM.",
      //   "rating": 4.1,
      //   "total_reviews": 318,
      //   "total_hours": 5.6,
      //   "total_lectures": 45,
      //   "current_price": 209000,
      //   "original_price": 489000,
      //   "is_bestseller": true,
      //   "createdAt": "2025-11-19T09:36:44.595Z",
      //   "updatedAt": "2025-11-19T09:36:44.595Z",
      //   "instructor_id": 6,
      //   "level_id": 1,
      //   "instructor": {
      //     "id": 6,
      //     "name": "Anton Voroniuk",
      //     "bio": "Productivity and AI research specialist",
      //     "createdAt": "2025-11-19T09:36:44.595Z",
      //     "updatedAt": "2025-11-19T09:36:44.595Z"
      //   },
      //   "level": {
      //     "id": 1,
      //     "name": "All Levels",
      //     "createdAt": "2025-11-19T09:36:44.595Z",
      //     "updatedAt": "2025-11-19T09:36:44.595Z"
      //   }
      // }
      // left (80%): title, description, instuctor name, stars (red color) total and list icon stars, total hours - total lectures - level name, (text align right)current price and origin price
      //right ( 20%): image
      const halfStar = `
  <svg class = "fill-yellow-500" xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="24" viewBox="0 0 24 24" width="24"><g><rect fill="none" height="24" width="24" x="0"/></g><g><g><g><path d="M22,9.24l-7.19-0.62L12,2L9.19,8.63L2,9.24l5.46,4.73L5.82,21L12,17.27L18.18,21l-1.63-7.03L22,9.24z M12,15.4V6.1 l1.71,4.04l4.38,0.38l-3.32,2.88l1,4.28L12,15.4z"/></g></g></g></svg>
`;
      const fullStar = `
    <svg class = "fill-yellow-500" xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" height="24" viewBox="0 0 24 24" width="24"><g><rect fill="none" height="24" width="24" x="0"/></g><g><g><g><path d="M22,9.24l-7.19-0.62L12,2L9.19,8.63L2,9.24l5.46,4.73L5.82,21L12,17.27L18.18,21l-1.63-7.03L22,9.24z"/></g></g></g></svg>
    `;
      const renderStars = (rating) => {
        const fullStars = Math.floor(rating);
        const halfStarNeeded = rating - fullStars >= 0.5;
        let starsHtml = "";
        for (let i = 0; i < fullStars; i++) {
          starsHtml += fullStar;
        }
        if (halfStarNeeded) {
          starsHtml += halfStar;
        }
        return starsHtml;
      };

      const itemComponent = (item) => `
      <div class="flex border p-4 mb-4">
        <div class="w-4/5 pr-4">
        <h2 class="text-xl font-bold mb-2">${item.title}</h2>
        <p class="text-gray-700 mb-2">${item.description}</p>
        <p class="text-sm text-gray-500 mb-2">Instructor: ${item.instructor.name}</p>
        <div class="flex items-center mb-2">
          <span class="text-red-500 font-bold mr-2">${item.rating}</span>
          ${renderStars(item.rating)}
        </div>
        <div class="flex items-center text-sm text-gray-500 mb-2">
          <span class="mr-4"><i class="fa-solid fa-clock"></i> ${item.total_hours} hours</span>
          <span class="mr-4"><i class="fa-solid fa-list"></i> ${item.total_lectures} lectures</span>
          <span>${item.level.name}</span>
        </div>
        <div class="text-right">
          <span class="text-lg font-bold text-gray-900">${item.current_price.toLocaleString()} VND</span>
          <span class="text-sm line-through text-gray-500 ml-2">${item.original_price.toLocaleString()} VND</span>
        </div>
        </div>
        <div class="w-1/5">
          <img src="${item.image_url}" alt="${item.title}" class="w-full h-auto object-cover rounded">
        </div>
      </div>
      `;
      window.goToPage = (pageNum) => {
        if (pageNum < 1 || pageNum > totalPages) return;
        page = pageNum;
        render();
      };
      const pagination = (totalPages) => `
        <div class="flex justify-between mt-4">
          <div>
          Showing ${Math.min((page - 1) * size + 1, data.length)} to ${Math.min(
            page * size,
            data.length,
          )} of ${data.length} entries
          </div>
          <div>
            <button
              class="mx-1 px-3 py-1 rounded bg-gray-200 disabled:opacity-50"
              onclick="goToPage(${page - 1})"
              ${page === 1 ? "disabled" : ""}
            >
              Previous
            </button>
            ${[...Array(totalPages)]
              .map(
                (_, i) => `
            <button
              class="mx-1 px-3 py-1 rounded ${
                page === i + 1 ? "bg-blue-500 text-white" : "bg-gray-200"
              }"
              onclick="goToPage(${i + 1})"
            >
              ${i + 1}
            </button>
          `,
              )
              .join("")}
            <button
              class="mx-1 px-3 py-1 rounded bg-gray-200 disabled:opacity-50"
              onclick="goToPage(${page + 1})"
              ${page === totalPages ? "disabled" : ""}
            >
              Next
            </button>
          </div>
        </div>
      `;

      const render = () => {
        const start = (page - 1) * size;
        const end = start + size;
        dataDiv.innerHTML =
          data.slice(start, end).map(itemComponent).join("") +
          pagination(totalPages);
      };

      render();
    </script>
  </body>
</html>
